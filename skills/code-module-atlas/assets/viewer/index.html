    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000008;
        color: #e0f0ff;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
        overflow: hidden;
        user-select: none;
      }

      #canvas {
        position: fixed;
        inset: 0;
        display: block;
      }

      /* ── 加载屏幕 ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000008;
        z-index: 100;
        transition: opacity 0.8s ease;
      }
      #loading.fade-out { opacity: 0; pointer-events: none; }

      /* 让文字与进度条浮在星系动画之上 */
      .loading-title, .loading-subtitle,
      #loading-progress, #depth-selector {
        position: relative;
        z-index: 2;
      }

      .loading-title {
        font-size: 2.4rem;
        font-weight: 300;
        letter-spacing: 0.25em;
        color: #7df8ff;
        text-shadow: 0 0 30px #00c8ff88;
        margin-bottom: 0.4em;
      }
      .loading-subtitle {
        font-size: 0.9rem;
        color: #4488aa;
        letter-spacing: 0.1em;
        margin-bottom: 2.5em;
      }
      .loading-bar-wrap {
        width: 280px;
        height: 2px;
        background: rgba(100,200,255,0.15);
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00c8ff, #7df8ff);
        box-shadow: 0 0 12px #00c8ff;
        transition: width 0.3s ease;
        border-radius: 2px;
      }
      #loading-text {
        margin-top: 1em;
        font-size: 0.78rem;
        color: #336688;
        letter-spacing: 0.05em;
      }
      #loading-sub {
        margin-top: 0.35em;
        font-size: 0.7rem;
        color: #2a5f7a;
        letter-spacing: 0.04em;
        opacity: 0;
        transition: opacity 0.3s ease;
        font-variant-numeric: tabular-nums;
        min-height: 1em;
      }
      #loading-sub.visible { opacity: 0.85; }

      /* ── 模块星系动画（长时间加载时显示）── */
      #loading-galaxy {
        position: absolute;
        top: 50%; left: 50%;
        width: 260px; height: 260px;
        margin: -130px 0 0 -130px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.8s ease;
        z-index: 0;
      }
      #loading-galaxy.visible { opacity: 0.55; }

      /* 中心的"光核"——一个发光文件节点 */
      .lg-core {
        position: absolute;
        top: 50%; left: 50%;
        width: 18px; height: 18px;
        margin: -9px 0 0 -9px;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #7df8ff 45%, rgba(0,200,255,0) 75%);
        box-shadow:
          0 0 20px rgba(125, 248, 255, 0.9),
          0 0 40px rgba(0, 200, 255, 0.5),
          0 0 80px rgba(0, 160, 255, 0.25);
        animation: lg-core-pulse 2.4s ease-in-out infinite;
      }
      @keyframes lg-core-pulse {
        0%, 100% { transform: scale(1); filter: brightness(1); }
        50%      { transform: scale(1.35); filter: brightness(1.5); }
      }

      /* 4 条轨道——每条是一个偏心椭圆，让整体看起来是 3D 星系 */
      .lg-ring {
        position: absolute;
        top: 50%; left: 50%;
        border: 1px dashed rgba(100, 200, 255, 0.15);
        border-radius: 50%;
        transform-origin: center center;
      }
      /* 卫星节点：贴在轨道边缘，随着轨道旋转 */
      .lg-sat {
        position: absolute;
        top: -4px; left: 50%;
        width: 8px; height: 8px;
        margin-left: -4px;
        border-radius: 50%;
        background: #7df8ff;
        box-shadow: 0 0 10px #00c8ff, 0 0 24px rgba(0, 200, 255, 0.6);
      }
      /* 每条轨道不同尺寸/角度/速度，互相错开，制造轨道层次感 */
      .lg-ring-1 {
        width: 100px; height: 100px; margin: -50px 0 0 -50px;
        transform: rotate(12deg) rotateX(62deg);
        animation: lg-spin 4.6s linear infinite;
      }
      .lg-ring-2 {
        width: 150px; height: 150px; margin: -75px 0 0 -75px;
        transform: rotate(-34deg) rotateX(70deg);
        animation: lg-spin 7.2s linear infinite reverse;
        border-color: rgba(0, 180, 255, 0.13);
      }
      .lg-ring-3 {
        width: 200px; height: 200px; margin: -100px 0 0 -100px;
        transform: rotate(26deg) rotateX(58deg);
        animation: lg-spin 10.4s linear infinite;
        border-color: rgba(120, 160, 255, 0.11);
      }
      .lg-ring-4 {
        width: 250px; height: 250px; margin: -125px 0 0 -125px;
        transform: rotate(-14deg) rotateX(65deg);
        animation: lg-spin 14.8s linear infinite reverse;
        border-color: rgba(100, 200, 255, 0.08);
      }
      .lg-ring-2 .lg-sat { background: #a8e4ff; box-shadow: 0 0 8px #5ec6ff; width: 6px; height: 6px; top: -3px; margin-left: -3px; }
      .lg-ring-3 .lg-sat { background: #c8fbff; box-shadow: 0 0 7px #9ad8ff; width: 5px; height: 5px; top: -2.5px; margin-left: -2.5px; }
      .lg-ring-4 .lg-sat { background: #e0f7ff; box-shadow: 0 0 6px #7fb8d8; width: 4px; height: 4px; top: -2px; margin-left: -2px; }

      @keyframes lg-spin {
        from { transform: var(--lg-tilt, rotate(0deg) rotateX(62deg)) rotateZ(0deg); }
        to   { transform: var(--lg-tilt, rotate(0deg) rotateX(62deg)) rotateZ(360deg); }
      }
      /* 由于 CSS 变量 + transform 组合较复杂，此处直接在各 ring 上覆盖 keyframes */
      .lg-ring-1 { animation-name: lg-spin-1; }
      .lg-ring-2 { animation-name: lg-spin-2; }
      .lg-ring-3 { animation-name: lg-spin-3; }
      .lg-ring-4 { animation-name: lg-spin-4; }
      @keyframes lg-spin-1 {
        from { transform: rotate(12deg)  rotateX(62deg) rotateZ(0deg); }
        to   { transform: rotate(12deg)  rotateX(62deg) rotateZ(360deg); }
      }
      @keyframes lg-spin-2 {
        from { transform: rotate(-34deg) rotateX(70deg) rotateZ(360deg); }
        to   { transform: rotate(-34deg) rotateX(70deg) rotateZ(0deg); }
      }
      @keyframes lg-spin-3 {
        from { transform: rotate(26deg)  rotateX(58deg) rotateZ(0deg); }
        to   { transform: rotate(26deg)  rotateX(58deg) rotateZ(360deg); }
      }
      @keyframes lg-spin-4 {
        from { transform: rotate(-14deg) rotateX(65deg) rotateZ(360deg); }
        to   { transform: rotate(-14deg) rotateX(65deg) rotateZ(0deg); }
      }
      /* 尊重用户系统设置：如果开启了"减少动态效果"，停止旋转 */
      @media (prefers-reduced-motion: reduce) {
        .lg-ring, .lg-core { animation: none !important; }
      }

      /* ── 深度选择器 ── */
      #depth-selector {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 0;
        animation: fadeIn 0.4s ease;
      }
      #depth-selector.visible { display: flex; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

      .depth-title {
        font-size: 0.82rem;
        color: #4a8aaa;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 1.4em;
      }
      .depth-value {
        font-size: 3rem;
        font-weight: 200;

        text-shadow: 0 0 20px #00c8ff66;

        min-width: 2ch;
        text-align: center;
      }
      .depth-sub {
        font-size: 0.72rem;
        color: #2a5570;
        margin-bottom: 1.8em;
        letter-spacing: 0.06em;
      }
      #depth-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 240px;
        height: 2px;
        background: rgba(100,200,255,0.15);
        border-radius: 2px;
        outline: none;
        margin-bottom: 2.2em;
      }
      #depth-slider::-webkit-slider-thumb {
        -webkit-appearance: none;

        border-radius: 50%;
        background: #00c8ff;
        box-shadow: 0 0 10px #00c8ff88;
        cursor: pointer;
      }
      #depth-slider::-moz-range-thumb {
        width: 16px; height: 16px;
        border-radius: 50%;
        background: #00c8ff;
        box-shadow: 0 0 10px #00c8ff88;
        cursor: pointer;
        border: none;
      }
      #depth-confirm {
        padding: 10px 32px;
        background: rgba(0,200,255,0.1);
        border: 1px solid rgba(0,200,255,0.35);
        border-radius: 24px;
        color: #7df8ff;
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: background 0.2s, box-shadow 0.2s;
      }
      #depth-confirm:hover {
        background: rgba(0,200,255,0.2);
        box-shadow: 0 0 16px rgba(0,200,255,0.2);
      }

      /* ── 搜索栏 ── */
      #search-wrap {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: min(380px, calc(100vw - 32px));
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      #search-wrap.visible { opacity: 1; }

      #search-row {
        display: flex;
        align-items: center;
      }

      #search-input {
        flex: 1;
        padding: 9px 16px;
        background: rgba(5, 15, 40, 0.85);
        border: 1px solid rgba(100,200,255,0.25);
        border-right: none;
        border-radius: 8px 0 0 8px;
        color: #c0e8ff;
        font-size: 0.88rem;
        outline: none;
        backdrop-filter: blur(12px);
        transition: border-color 0.2s;
      }
      #search-input:focus { border-color: rgba(100,200,255,0.6); }
      #search-input::placeholder { color: #2a5570; }

      #search-btn {
        padding: 9px 14px;
        background: rgba(0,200,255,0.12);
        border: 1px solid rgba(100,200,255,0.25);
        border-radius: 0 8px 8px 0;
        color: #6af0ff;
        font-size: 0.85rem;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: background 0.2s;
        white-space: nowrap;
      }
      #search-btn:hover { background: rgba(0,200,255,0.25); }

      #search-results {
        display: none;
        flex-direction: column;
        margin-top: 6px;
        background: rgba(4, 12, 35, 0.92);
        border: 1px solid rgba(100,200,255,0.2);
        border-radius: 10px;
        backdrop-filter: blur(16px);

      }
      #search-results.open { display: flex; }
      #search-results::-webkit-scrollbar { width: 4px; }

      }
      .search-result-item:last-child { border-bottom: none; }

      .search-result-item.focused { background: rgba(0,160,255,0.18); }
      .sri-title {
        font-size: 0.85rem;
        color: #c0e8ff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sri-url {

      }

      @media (max-width: 560px) {
        /* 窄屏：搜索框不再居中，右侧预留 64px 给用户按钮（头像圆约 40px + 14px 右边距 + 10px 间隙） */
        #search-wrap {

      }

      /* ── 分类子星图控制 ── */
      #category-dock {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 218px;
        z-index: 9;
        opacity: 0;

      }

      }
      #category-chips {

      #category-chips::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.2); border-radius: 2px; }
      .category-chip {
