<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7df8ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7df8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="32" height="32" rx="7" fill="#000814"/>

  <!-- 微小星点 -->
  <circle cx="4"  cy="6"  r="0.45" fill="#1a4060" opacity="0.8"/>
  <circle cx="27" cy="4"  r="0.35" fill="#1a4060" opacity="0.6"/>
  <circle cx="29" cy="14" r="0.4"  fill="#1a4060" opacity="0.5"/>
  <circle cx="3"  cy="19" r="0.35" fill="#1a4060" opacity="0.5"/>
  <circle cx="11" cy="28" r="0.4"  fill="#1a4060" opacity="0.5"/>

  <!-- 连接线 -->
  <line x1="16" y1="7"  x2="6"  y2="23" stroke="#00c8ff" stroke-width="0.7" opacity="0.4"/>
  <line x1="16" y1="7"  x2="26" y2="22" stroke="#00c8ff" stroke-width="0.7" opacity="0.4"/>
  <line x1="6"  y1="23" x2="26" y2="22" stroke="#00c8ff" stroke-width="0.6" opacity="0.3"/>
  <line x1="16" y1="7"  x2="23" y2="13" stroke="#00c8ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="23" y1="13" x2="26" y2="22" stroke="#00c8ff" stroke-width="0.5" opacity="0.2"/>

  <!-- 光晕 -->
  <circle cx="16" cy="7"  r="7"   fill="url(#g1)" filter="url(#blur1)"/>
  <circle cx="6"  cy="23" r="4.5" fill="url(#g2)" filter="url(#blur1)"/>
  <circle cx="26" cy="22" r="5"   fill="url(#g2)" filter="url(#blur1)"/>

  <!-- 节点 -->
  <circle cx="16" cy="7"  r="2.8" fill="#7df8ff"/>
  <circle cx="6"  cy="23" r="1.9" fill="#00c8ff"/>
  <circle cx="26" cy="22" r="2.2" fill="#00c8ff"/>
  <circle cx="23" cy="13" r="1.3" fill="#3a8aaa"/>
</svg>
